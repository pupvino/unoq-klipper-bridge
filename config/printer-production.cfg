# ════════════════════════════════════════════════════════════════════════
# CRYSTAL CORE MASTER - ToAuto Pyramid 300 (Total UART Production Master)
# ════════════════════════════════════════════════════════════════════════

[include mainsail.cfg]

[mcu]
baud: 250000
# SKR Mini E3 V3.0 via High-Speed UART (Liberated HS1)
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_2800550006504E5238363120-if00
baud: 250000
restart_method: command

[mcu unoq]
# Uno Q Bridge via Internal UART (Liberated MSM0)
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_2800550006504E5238363120-if00
baud: 250000
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 15
max_z_accel: 100

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_max: 300
homing_speed: 50

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_max: 300
homing_speed: 50

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
endstop_pin: ^PC2
position_endstop: 0.0
position_max: 350

[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 3.433
nozzle_diameter: 0.600
filament_diameter: 1.750
heater_pin: PC8
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA0
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 300

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

[probe]
pin: ^PA3
z_offset: 0

[adxl345]
# Uno Q SPI1 Bridge
cs_pin: unoq:PB2
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points: 150, 150, 20

[gcode_macro CRYSTAL_INIT]
gcode:
    M117 🚀 NEURAL LINK ESTABLISHED
    G28
